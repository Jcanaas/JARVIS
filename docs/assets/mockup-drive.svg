<svg width="900" height="560" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Consolas, monospace">
  <!-- Background -->
  <rect width="900" height="560" fill="#0D1117"/>

  <!-- Title bar -->
  <rect width="900" height="38" fill="#080E19"/>
  <circle cx="18" cy="19" r="6" fill="#FB7185"/>
  <circle cx="36" cy="19" r="6" fill="#FCD34D"/>
  <circle cx="54" cy="19" r="6" fill="#4ADE80"/>
  <text x="450" y="24" text-anchor="middle" fill="#7DD3FC" font-size="13" font-weight="bold" letter-spacing="2">JARVIS  —  Google Drive</text>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Sidebar -->
  <rect x="0" y="38" width="200" height="522" fill="#080E19"/>
  <line x1="200" y1="38" x2="200" y2="560" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Sidebar navigation -->
  <rect x="8" y="54" width="184" height="32" rx="6" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="24" y="74" fill="#38BDF8" font-size="12" font-weight="bold">Mi unidad</text>

  <text x="24" y="114" fill="rgba(180,210,240,0.6)" font-size="12">Compartido conmigo</text>
  <text x="24" y="148" fill="rgba(180,210,240,0.6)" font-size="12">Recientes</text>
  <text x="24" y="182" fill="rgba(180,210,240,0.6)" font-size="12">Destacados</text>
  <text x="24" y="216" fill="rgba(180,210,240,0.6)" font-size="12">Papelera</text>

  <line x1="16" y1="232" x2="184" y2="232" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Storage bar -->
  <text x="16" y="258" fill="rgba(180,210,240,0.4)" font-size="9" letter-spacing="1">ALMACENAMIENTO</text>
  <rect x="16" y="266" width="168" height="6" rx="3" fill="#0F2137"/>
  <rect x="16" y="266" width="134" height="6" rx="3" fill="#38BDF8"/>
  <text x="16" y="284" fill="rgba(180,210,240,0.5)" font-size="9">14,7 GB de 15 GB usados</text>

  <!-- Subir button -->
  <rect x="8" y="296" width="184" height="34" rx="17" fill="#38BDF8"/>
  <text x="100" y="317" text-anchor="middle" fill="#0D1117" font-size="12" font-weight="bold">+ Subir archivo</text>

  <!-- Main content -->
  <!-- Breadcrumb -->
  <rect x="200" y="38" width="700" height="40" fill="#0A1628"/>
  <line x1="200" y1="78" x2="900" y2="78" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.15"/>
  <text x="216" y="62" fill="rgba(180,210,240,0.55)" font-size="11">Mi unidad</text>
  <text x="270" y="62" fill="rgba(180,210,240,0.3)" font-size="11">/</text>
  <text x="280" y="62" fill="rgba(180,210,240,0.55)" font-size="11">Proyectos</text>
  <text x="350" y="62" fill="rgba(180,210,240,0.3)" font-size="11">/</text>
  <text x="360" y="62" fill="#DFF5FF" font-size="11">JARVIS</text>

  <!-- List header -->
  <rect x="200" y="78" width="700" height="32" fill="#080E19"/>
  <line x1="200" y1="110" x2="900" y2="110" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.15"/>
  <text x="240" y="98" fill="#7DD3FC" font-size="10" letter-spacing="1">NOMBRE</text>
  <text x="560" y="98" fill="#7DD3FC" font-size="10" letter-spacing="1">PROPIETARIO</text>
  <text x="700" y="98" fill="#7DD3FC" font-size="10" letter-spacing="1">MODIFICADO</text>
  <text x="820" y="98" fill="#7DD3FC" font-size="10" letter-spacing="1">TAMANO</text>

  <!-- Folder rows -->
  <!-- Folder 1 -->
  <rect x="200" y="110" width="700" height="44" fill="#0A1628"/>
  <line x1="200" y1="154" x2="900" y2="154" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <!-- Folder icon -->
  <rect x="218" y="122" width="28" height="22" rx="2" fill="#FCD34D" fill-opacity="0.7"/>
  <rect x="218" y="120" width="14" height="5" rx="2" fill="#FCD34D" fill-opacity="0.4"/>
  <text x="258" y="136" fill="#DFF5FF" font-size="12">docs</text>
  <text x="560" y="136" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="136" fill="rgba(180,210,240,0.5)" font-size="11">23 jun</text>

  <!-- Folder 2 -->
  <rect x="200" y="154" width="700" height="44" fill="#080E19"/>
  <line x1="200" y1="198" x2="900" y2="198" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <rect x="218" y="166" width="28" height="22" rx="2" fill="#FCD34D" fill-opacity="0.7"/>
  <rect x="218" y="164" width="14" height="5" rx="2" fill="#FCD34D" fill-opacity="0.4"/>
  <text x="258" y="180" fill="#DFF5FF" font-size="12">config</text>
  <text x="560" y="180" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="180" fill="rgba(180,210,240,0.5)" font-size="11">20 jun</text>

  <!-- File 1 - Python -->
  <rect x="200" y="198" width="700" height="44" fill="#0A1628"/>
  <line x1="200" y1="242" x2="900" y2="242" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <!-- Python file icon -->
  <rect x="218" y="210" width="22" height="28" rx="2" fill="#38BDF8" fill-opacity="0.2" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="229" y="228" text-anchor="middle" fill="#38BDF8" font-size="8" font-weight="bold">PY</text>
  <text x="258" y="224" fill="#DFF5FF" font-size="12">main.py</text>
  <text x="560" y="224" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="224" fill="rgba(180,210,240,0.5)" font-size="11">23 jun</text>
  <text x="820" y="224" fill="rgba(180,210,240,0.5)" font-size="11">48 KB</text>

  <!-- File 2 - PDF -->
  <rect x="200" y="242" width="700" height="44" fill="#080E19"/>
  <line x1="200" y1="286" x2="900" y2="286" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <rect x="218" y="254" width="22" height="28" rx="2" fill="#FB7185" fill-opacity="0.2" stroke="#FB7185" stroke-width="1" stroke-opacity="0.4"/>
  <text x="229" y="272" text-anchor="middle" fill="#FB7185" font-size="8" font-weight="bold">PDF</text>
  <text x="258" y="268" fill="#DFF5FF" font-size="12">Presupuesto_2025.pdf</text>
  <text x="560" y="268" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="268" fill="rgba(180,210,240,0.5)" font-size="11">18 jun</text>
  <text x="820" y="268" fill="rgba(180,210,240,0.5)" font-size="11">2,1 MB</text>

  <!-- File 3 - Spreadsheet -->
  <rect x="200" y="286" width="700" height="44" fill="#0A1628"/>
  <line x1="200" y1="330" x2="900" y2="330" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <rect x="218" y="298" width="22" height="28" rx="2" fill="#4ADE80" fill-opacity="0.2" stroke="#4ADE80" stroke-width="1" stroke-opacity="0.4"/>
  <text x="229" y="316" text-anchor="middle" fill="#4ADE80" font-size="7" font-weight="bold">XLSX</text>
  <text x="258" y="312" fill="#DFF5FF" font-size="12">Gastos_junio.xlsx</text>
  <text x="560" y="312" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="312" fill="rgba(180,210,240,0.5)" font-size="11">15 jun</text>
  <text x="820" y="312" fill="rgba(180,210,240,0.5)" font-size="11">128 KB</text>

  <!-- File 4 - Image -->
  <rect x="200" y="330" width="700" height="44" fill="#080E19"/>
  <line x1="200" y1="374" x2="900" y2="374" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.07"/>
  <rect x="218" y="342" width="22" height="28" rx="2" fill="#A78BFA" fill-opacity="0.2" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="229" y="360" text-anchor="middle" fill="#A78BFA" font-size="8" font-weight="bold">PNG</text>
  <text x="258" y="356" fill="#DFF5FF" font-size="12">portada_proyecto.png</text>
  <text x="560" y="356" fill="rgba(180,210,240,0.5)" font-size="11">Yo</text>
  <text x="700" y="356" fill="rgba(180,210,240,0.5)" font-size="11">10 jun</text>
  <text x="820" y="356" fill="rgba(180,210,240,0.5)" font-size="11">3,4 MB</text>

  <!-- Fade out -->
  <defs>
    <linearGradient id="fadeDrive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="200" y="374" width="700" height="186" fill="url(#fadeDrive)"/>

  <!-- Status bar -->
  <rect x="0" y="530" width="900" height="30" fill="#060D18"/>
  <line x1="0" y1="530" x2="900" y2="530" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.15"/>
  <text x="216" y="549" fill="rgba(180,210,240,0.4)" font-size="10">8 elementos  —  Almacenamiento: 14,7 GB / 15 GB</text>
</svg>

<svg width="900" height="560" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Consolas, monospace">
  <!-- Background -->
  <rect width="900" height="560" fill="#0D1117"/>

  <!-- Title bar -->
  <rect width="900" height="38" fill="#080E19"/>
  <circle cx="18" cy="19" r="6" fill="#FB7185"/>
  <circle cx="36" cy="19" r="6" fill="#FCD34D"/>
  <circle cx="54" cy="19" r="6" fill="#4ADE80"/>
  <text x="450" y="24" text-anchor="middle" fill="#7DD3FC" font-size="13" font-weight="bold" letter-spacing="2">JARVIS  —  YouTube Music</text>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Playlist banner -->
  <rect x="0" y="38" width="900" height="110" fill="#080E19"/>
  <!-- Album art placeholder -->
  <rect x="18" y="52" width="82" height="82" rx="6" fill="#0F2137" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="36" y="70" width="46" height="46" rx="23" fill="#38BDF8" fill-opacity="0.2"/>
  <polygon points="54,82 54,102 72,92" fill="#38BDF8" fill-opacity="0.7"/>

  <!-- Playlist info -->
  <text x="118" y="73" fill="rgba(180,210,240,0.5)" font-size="10" letter-spacing="1">PLAYLIST</text>
  <text x="118" y="94" fill="#DFF5FF" font-size="18" font-weight="bold">Me gusta</text>
  <text x="118" y="114" fill="#7DD3FC" font-size="11">248 canciones  —  YouTube Music  —  Sincronizado</text>
  <text x="118" y="132" fill="rgba(180,210,240,0.5)" font-size="10">Duracion total: 16 h 42 min</text>

  <!-- Action buttons -->
  <rect x="630" y="60" width="80" height="28" rx="14" fill="#38BDF8"/>
  <text x="670" y="79" text-anchor="middle" fill="#0D1117" font-size="12" font-weight="bold">PLAY</text>
  <rect x="720" y="60" width="90" height="28" rx="14" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <text x="765" y="79" text-anchor="middle" fill="#38BDF8" font-size="12">SHUFFLE</text>

  <!-- Menu button -->
  <rect x="858" y="52" width="28" height="28" rx="6" fill="none" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="872" y="71" text-anchor="middle" fill="#7DD3FC" font-size="16" font-weight="bold">...</text>

  <!-- Table header -->
  <rect x="0" y="148" width="900" height="30" fill="#080E19"/>
  <line x1="0" y1="178" x2="900" y2="178" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="20" y="168" fill="#7DD3FC" font-size="10" letter-spacing="1">#</text>
  <text x="50" y="168" fill="#7DD3FC" font-size="10" letter-spacing="1">TITULO</text>
  <text x="360" y="168" fill="#7DD3FC" font-size="10" letter-spacing="1">ARTISTA</text>
  <text x="530" y="168" fill="#7DD3FC" font-size="10" letter-spacing="1">ALBUM</text>
  <text x="740" y="168" fill="#7DD3FC" font-size="10" letter-spacing="1">DURACION</text>

  <!-- Track rows -->
  <!-- Row 1 (playing) -->
  <rect x="0" y="178" width="900" height="38" fill="#38BDF8" fill-opacity="0.08"/>
  <text x="20" y="201" fill="#38BDF8" font-size="11">1</text>
  <rect x="42" y="185" width="26" height="26" rx="4" fill="#0F2137" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.5"/>
  <polygon points="49,193 49,203 61,198" fill="#38BDF8"/>
  <text x="78" y="201" fill="#38BDF8" font-size="12" font-weight="bold">Blinding Lights</text>
  <text x="360" y="201" fill="#DFF5FF" font-size="12">The Weeknd</text>
  <text x="530" y="201" fill="rgba(180,210,240,0.65)" font-size="11">After Hours</text>
  <text x="740" y="201" fill="rgba(180,210,240,0.65)" font-size="11">3:20</text>
  <text x="810" y="201" fill="#4ADE80" font-size="9">REPRODUCIENDO</text>

  <!-- Row 2 -->
  <rect x="0" y="216" width="900" height="38" fill="none"/>
  <text x="20" y="239" fill="rgba(180,210,240,0.4)" font-size="11">2</text>
  <rect x="42" y="223" width="26" height="26" rx="4" fill="#0F2137"/>
  <text x="78" y="239" fill="#DFF5FF" font-size="12">Save Your Tears</text>
  <text x="360" y="239" fill="#DFF5FF" font-size="12">The Weeknd</text>
  <text x="530" y="239" fill="rgba(180,210,240,0.65)" font-size="11">After Hours (Deluxe)</text>
  <text x="740" y="239" fill="rgba(180,210,240,0.65)" font-size="11">3:36</text>

  <!-- Row 3 -->
  <rect x="0" y="254" width="900" height="38" fill="#38BDF8" fill-opacity="0.03"/>
  <text x="20" y="277" fill="rgba(180,210,240,0.4)" font-size="11">3</text>
  <rect x="42" y="261" width="26" height="26" rx="4" fill="#0F2137"/>
  <text x="78" y="277" fill="#DFF5FF" font-size="12">Starboy</text>
  <text x="360" y="277" fill="#DFF5FF" font-size="12">The Weeknd, Daft Punk</text>
  <text x="530" y="277" fill="rgba(180,210,240,0.65)" font-size="11">Starboy</text>
  <text x="740" y="277" fill="rgba(180,210,240,0.65)" font-size="11">3:50</text>

  <!-- Row 4 -->
  <text x="20" y="315" fill="rgba(180,210,240,0.4)" font-size="11">4</text>
  <rect x="42" y="299" width="26" height="26" rx="4" fill="#0F2137"/>
  <text x="78" y="315" fill="#DFF5FF" font-size="12">Die For You</text>
  <text x="360" y="315" fill="#DFF5FF" font-size="12">The Weeknd</text>
  <text x="530" y="315" fill="rgba(180,210,240,0.65)" font-size="11">Starboy</text>
  <text x="740" y="315" fill="rgba(180,210,240,0.65)" font-size="11">4:20</text>

  <!-- Row 5 -->
  <rect x="0" y="330" width="900" height="38" fill="#38BDF8" fill-opacity="0.03"/>
  <text x="20" y="353" fill="rgba(180,210,240,0.4)" font-size="11">5</text>
  <rect x="42" y="337" width="26" height="26" rx="4" fill="#0F2137"/>
  <text x="78" y="353" fill="#DFF5FF" font-size="12">Can't Feel My Face</text>
  <text x="360" y="353" fill="#DFF5FF" font-size="12">The Weeknd</text>
  <text x="530" y="353" fill="rgba(180,210,240,0.65)" font-size="11">Beauty Behind the Madness</text>
  <text x="740" y="353" fill="rgba(180,210,240,0.65)" font-size="11">3:35</text>

  <!-- Row 6 -->
  <text x="20" y="391" fill="rgba(180,210,240,0.4)" font-size="11">6</text>
  <rect x="42" y="375" width="26" height="26" rx="4" fill="#0F2137"/>
  <text x="78" y="391" fill="#DFF5FF" font-size="12">Earned It</text>
  <text x="360" y="391" fill="#DFF5FF" font-size="12">The Weeknd</text>
  <text x="530" y="391" fill="rgba(180,210,240,0.65)" font-size="11">Beauty Behind the Madness</text>
  <text x="740" y="391" fill="rgba(180,210,240,0.65)" font-size="11">4:07</text>

  <!-- Mini player bottom -->
  <rect x="0" y="440" width="900" height="120" fill="#060D18"/>
  <line x1="0" y1="440" x2="900" y2="440" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Mini album art -->
  <rect x="16" y="456" width="68" height="68" rx="8" fill="#0F2137" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="32" y="472" width="36" height="36" rx="18" fill="#38BDF8" fill-opacity="0.2"/>
  <polygon points="41,481 41,497 57,489" fill="#38BDF8" fill-opacity="0.7"/>

  <!-- Song info -->
  <text x="96" y="476" fill="#DFF5FF" font-size="14" font-weight="bold">Blinding Lights</text>
  <text x="96" y="494" fill="#7DD3FC" font-size="11">The Weeknd</text>

  <!-- Progress bar -->
  <rect x="96" y="506" width="560" height="4" rx="2" fill="#0F2137"/>
  <rect x="96" y="506" width="185" height="4" rx="2" fill="#38BDF8"/>
  <circle cx="281" cy="508" r="5" fill="#38BDF8"/>
  <text x="96" y="522" fill="rgba(180,210,240,0.5)" font-size="9">1:32</text>
  <text x="650" y="522" fill="rgba(180,210,240,0.5)" font-size="9">3:20</text>

  <!-- Controls -->
  <text x="680" y="490" fill="rgba(180,210,240,0.5)" font-size="20" text-anchor="middle">|&lt;</text>
  <rect x="710" y="472" width="36" height="36" rx="18" fill="#38BDF8"/>
  <polygon points="718,484 718,498 740,491" fill="#0D1117"/>
  <text x="770" y="490" fill="rgba(180,210,240,0.5)" font-size="20" text-anchor="middle">&gt;|</text>

  <!-- Volume -->
  <text x="800" y="490" fill="rgba(180,210,240,0.4)" font-size="10">VOL</text>
  <rect x="820" y="486" width="64" height="4" rx="2" fill="#0F2137"/>
  <rect x="820" y="486" width="48" height="4" rx="2" fill="#7DD3FC"/>
</svg>
